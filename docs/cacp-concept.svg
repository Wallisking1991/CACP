<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
    <marker id="arrow-accent" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c76b2a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="960" height="640" fill="#faf8f5"/>
  <text x="480" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#1c1813">CACP — 协作式 AI 房间</text>
  <text x="480" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b6255">多人共享一个本地 Agent,由房主控制 AI 流转节奏</text>
  <text x="80" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1">参与者层</text>
  <rect x="80" y="115" width="180" height="70" rx="10" fill="#ffffff" stroke="#e8e0d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="170" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1c1813">房主</text>
  <text x="170" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b6255">控制 AI 流转节奏</text>
  <rect x="80" y="205" width="180" height="70" rx="10" fill="#ffffff" stroke="#e8e0d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="170" y="238" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1c1813">成员</text>
  <text x="170" y="258" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b6255">发送消息参与讨论</text>
  <rect x="80" y="295" width="180" height="70" rx="10" fill="#ffffff" stroke="#e8e0d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="170" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1c1813">观察者</text>
  <text x="170" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b6255">只读浏览,不参与</text>
  <text x="390" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1">共享协调层</text>
  <rect x="340" y="115" width="280" height="250" rx="12" fill="#f5f0e8" stroke="#d4c8b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1c1813">协作房间</text>
  <text x="480" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b6255">Collaborative Room</text>
  <rect x="365" y="180" width="110" height="60" rx="8" fill="#ffffff" stroke="#e8e0d5" stroke-width="1"/>
  <text x="420" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1c1813">事件日志</text>
  <text x="420" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af">Append-Only</text>
  <rect x="485" y="180" width="110" height="60" rx="8" fill="#ffffff" stroke="#e8e0d5" stroke-width="1"/>
  <text x="540" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1c1813">圆桌模式</text>
  <text x="540" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af">Batching</text>
  <rect x="365" y="260" width="230" height="50" rx="8" fill="#ffffff" stroke="#e8e0d5" stroke-width="1"/>
  <text x="480" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1c1813">角色权限体系</text>
  <text x="480" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">所有人从同一事件流推导状态</text>
  <text x="700" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1">AI 执行层</text>
  <rect x="700" y="165" width="180" height="150" rx="10" fill="#ffffff" stroke="#c76b2a" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1c1813">共享本地 Agent</text>
  <text x="790" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">Claude Code / Codex</text>
  <text x="790" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">opencode / echo</text>
  <text x="790" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">单轮次推理 · 流式输出</text>
  <text x="790" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c76b2a">在房主本地机器运行</text>
  <line x1="260" y1="150" x2="340" y2="150" stroke="#c76b2a" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <rect x="270" y="138" width="60" height="18" rx="4" fill="#faf8f5" opacity="0.95"/>
  <text x="300" y="151" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c76b2a">控制流</text>
  <line x1="260" y1="240" x2="340" y2="240" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)" stroke-dasharray="4,2"/>
  <rect x="275" y="228" width="50" height="18" rx="4" fill="#faf8f5" opacity="0.95"/>
  <text x="300" y="241" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b6255">发消息</text>
  <line x1="620" y1="240" x2="700" y2="240" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="625" y="228" width="70" height="18" rx="4" fill="#faf8f5" opacity="0.95"/>
  <text x="660" y="241" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7c3aed">合并提示词</text>
  <line x1="700" y1="290" x2="620" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="625" y="278" width="70" height="18" rx="4" fill="#faf8f5" opacity="0.95"/>
  <text x="660" y="291" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2563eb">流式回复</text>
  <line x1="340" y1="320" x2="260" y2="320" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)" stroke-dasharray="4,2"/>
  <rect x="275" y="308" width="50" height="18" rx="4" fill="#faf8f5" opacity="0.95"/>
  <text x="300" y="321" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b6255">实时同步</text>
  <rect x="80" y="420" width="260" height="55" rx="8" fill="#ffffff" stroke="#e8e0d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="210" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1c1813">事件溯源</text>
  <text x="210" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">所有人从同一事件流推导完全一致的状态</text>
  <rect x="350" y="420" width="260" height="55" rx="8" fill="#ffffff" stroke="#e8e0d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1c1813">房主控制流</text>
  <text x="480" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">圆桌 → 审阅 → 提交 → 一次 AI 轮次</text>
  <rect x="620" y="420" width="260" height="55" rx="8" fill="#ffffff" stroke="#e8e0d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="750" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1c1813">本地优先</text>
  <text x="750" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">Agent 在房主本地机器运行,数据不出本地</text>
  <text x="80" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#9ca3af">图例</text>
  <line x1="80" y1="525" x2="110" y2="525" stroke="#c76b2a" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <text x="120" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">控制指令流</text>
  <line x1="220" y1="525" x2="250" y2="525" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-gray)" stroke-dasharray="4,2"/>
  <text x="260" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">消息/同步</text>
  <line x1="350" y1="525" x2="380" y2="525" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="390" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">AI 输入(合并提示词)</text>
  <line x1="520" y1="525" x2="550" y2="525" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="560" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b6255">AI 输出(流式回复)</text>
</svg>