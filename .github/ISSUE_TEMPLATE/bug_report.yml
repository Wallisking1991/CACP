name: Bug report
description: Report a reproducible problem in CACP
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, tokens, server passwords, SSH keys, or private room links.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - protocol
        - server
        - cli-adapter
        - web
        - deployment
        - documentation
        - unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      description: Paste the commit hash, release version, or branch name.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, browser, and relevant local setup.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets before attaching logs or images.
      render: text
